<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Relatório</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.0/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="uk-container uk-margin-top">

<h2>Relatório de Vendas</h2>

<div class="uk-grid-small" uk-grid>
    <div class="uk-width-1-3@s">
        <input type="date" id="inicio" class="uk-input">
    </div>

    <div class="uk-width-1-3@s">
        <input type="date" id="fim" class="uk-input">
    </div>

    <div class="uk-width-1-3@s">
        <button onclick="buscarRelatorio()" class="uk-button uk-button-primary uk-width-1-1">
            Buscar
        </button>
    </div>
</div>

<hr>

<h3>Total do Período: R$ <span id="total">0</span></h3>

<table class="uk-table uk-table-striped uk-table-small">
    <thead>
        <tr>
            <th>Produto</th>
            <th>Cliente</th>
            <th>Qtd</th>
            <th>Total</th>
            <th>Data</th>
        </tr>
    </thead>
    <tbody id="tabelaVendas"></tbody>
</table>

<canvas id="grafico"></canvas>

</div>

<script>

const API = "https://sistema-loja-api.onrender.com"; 
// ⬆️ DEPOIS NO RENDER você troca isso

async function buscarRelatorio() {

    const token = localStorage.getItem("token");
    const inicio = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;

    const response = await fetch(
        `${API}/relatorio?inicio=${inicio}&fim=${fim}`,
        {
            headers: { Authorization: token }
        }
    );

    const data = await response.json();

    document.getElementById("total").innerText =
        data.totalPeriodo.toFixed(2);

    const tabela = document.getElementById("tabelaVendas");
    tabela.innerHTML = "";

    data.vendas.forEach(v => {
        tabela.innerHTML += `
            <tr>
                <td>${v.produto.nome}</td>
                <td>${v.cliente.nome}</td>
                <td>${v.quantidade}</td>
                <td>R$ ${v.total.toFixed(2)}</td>
                <td>${new Date(v.data).toLocaleDateString()}</td>
            </tr>
        `;
    });

    montarGrafico(data.maisVendidos);
}

function montarGrafico(dados) {

    const nomes = dados.map(d => "Produto " + d.produtoId);
    const quantidades = dados.map(d => d._sum.quantidade);

    new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: nomes,
            datasets: [{
                label: "Mais vendidos",
                data: quantidades
            }]
        }
    });
}

</script>

</body>
</html>
