<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mariá Skincare</title>

<!-- UIkit -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/css/uikit.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit-icons.min.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link rel="icon" type="image/png" href="logo-m.ico">

<style>
:root {
  --primary: #2563eb;
  --secondary: #7c3aed;
  --success: #10b981;
  --danger: #ef4444;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 20px;
}

.login-container {
  width: 100%;
  max-width: 600px;
}

.login-card {
  background: rgba(255, 255, 255, 0.98);
  border-radius: 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  padding: 50px 45px;
  animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
  from { opacity:0; transform: translateY(30px);}
  to { opacity:1; transform: translateY(0);}
}

.login-header {
  text-align: center;
  margin-bottom: 40px;
}

.brand-icon {
  width: 120px;
  height: 120px;
  background: rgba(255, 255, 255, 0.98);
  border-radius: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 25px;
  color: #333;  /* Cinza escuro */
  font-size: 60px;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
  animation: pulse 3s infinite;
  border: 1px solid rgba(0,0,0,0.05); /* Borda sutil opcional */
}

@keyframes pulse {
  0%,100%{opacity:1;}
  50%{opacity:0.8;}
}

.login-header h1 {
  font-size: 2.8rem;
  margin: 0 0 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

.login-header p {
  color: #64748b;
  font-size: 1.2rem;
}

.form-group {
  margin-bottom: 25px;
  position: relative;
}

.input-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  font-size: 1.4rem;
}

.modern-input {
  width: 100%;
  padding: 18px 18px 18px 55px;
  border: 3px solid #e2e8f0;
  border-radius: 20px;
  font-size: 1.2rem;
  transition: all 0.3s;
  box-sizing: border-box;
}

.modern-input:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.15);
}

.login-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 1.3rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 30px;
  transition: 0.3s;
}

.login-btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(37, 99, 235, 0.4);
}

.login-btn.loading {
  opacity: 0.8;
  cursor: not-allowed;
}

.error-message {
  background: #fee2e2;
  color: var(--danger);
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
  display: none;
}

.error-message.show {
  display: block;
}

.login-footer {
  text-align: center;
  margin-top: 35px;
  padding-top: 25px;
  border-top: 3px solid #f1f5f9;
}

/* MOBILE FULL SCREEN */
@media (max-width: 480px) {
  body {
    padding: 0;
    align-items: stretch;
  }

  .login-container {
    max-width: 100%;
    width: 100%;
    height: 100vh;
  }

  .login-card {
    border-radius: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
}
</style>
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="brand-icon">
       <img src="logo-login.png" alt="">
      </div>
      <h1>Mariá Skincare</h1>
      <p>Faça login para acessar o sistema</p>
    </div>

    <div class="form-group">
      <i class="fas fa-user input-icon"></i>
      <input type="text" id="usuario" class="modern-input" placeholder="Digite seu usuário">
    </div>

    <div class="form-group">
      <i class="fas fa-lock input-icon"></i>
      <input type="password" id="senha" class="modern-input" placeholder="Digite sua senha">
    </div>

    <button class="login-btn" id="btnLogin">
      <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
    </button>

    <div class="error-message" id="errorMessage"></div>

    <div class="login-footer">
      © 2024 Mariá Skincare
    </div>

  </div>
</div>

<script>
const API = "https://sistema-loja-api.onrender.com";

const btn = document.getElementById("btnLogin");
const errorDiv = document.getElementById("errorMessage");

btn.addEventListener("click", logar);

async function logar() {

  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!usuario || !senha) {
    showError("Preencha usuário e senha!");
    return;
  }

  setLoading(true);

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, senha })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      if (data.usuario) {
        localStorage.setItem("usuario", data.usuario);
      }

      UIkit.notification({
        message: '<i class="fas fa-check-circle"></i> Login realizado com sucesso!',
        status: 'success',
        timeout: 2000,
        pos: 'top-center'
      });

      setTimeout(() => {
        window.location.href = "index.html";
      }, 600);

    } else {
      showError(data.error || "Usuário ou senha inválidos!");
    }

  } catch (err) {
    showError("Erro de conexão com o servidor!");
  } finally {
    setLoading(false);
  }
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add("show");
}

function setLoading(state) {
  if (state) {
    btn.classList.add("loading");
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
    btn.disabled = true;
  } else {
    btn.classList.remove("loading");
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
