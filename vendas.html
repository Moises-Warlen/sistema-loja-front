<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Vendas - Mariá Skincare</title>

<!-- UIkit -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/css/uikit.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit-icons.min.js"></script>
<!-- Ícone da página (favicon) -->
  <link rel="icon" type="image/png" href="logo-m.ico">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Select2 para busca nos selects -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/i18n/pt-BR.js"></script>

<style>
  :root {
    --primary: #2563eb;
    --secondary: #7c3aed;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --dark: #1e293b;
    --light: #f8fafc;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .uk-container {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: clamp(20px, 5vw, 40px);
    box-shadow: 0 30px 70px rgba(0,0,0,0.3);
    padding: clamp(16px, 4vw, 30px) !important;
    width: 100%;
    max-width: 1400px !important;
    margin: 0 auto;
    height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header fixo */
  .page-header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    margin: calc(clamp(16px, 4vw, 30px) * -1) calc(clamp(16px, 4vw, 30px) * -1) 0 calc(clamp(16px, 4vw, 30px) * -1);
    padding: clamp(16px, 3vw, 25px) clamp(20px, 4vw, 30px);
    border-radius: clamp(20px, 5vw, 40px) clamp(20px, 5vw, 40px) 0 0;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    flex-shrink: 0;
  }

  .page-header h1 {
    font-size: clamp(1.3rem, 4vw, 2rem);
    margin: 0;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.2;
  }

  /* Menu Hamburguer */
  .menu-container {
    position: relative;
  }

  .hamburger-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    color: white;
    width: clamp(40px, 8vw, 45px);
    height: clamp(40px, 8vw, 45px);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    font-size: clamp(1.1rem, 3vw, 1.3rem);
  }

  .hamburger-btn:hover {
    background: white;
    color: var(--primary);
    border-color: white;
    transform: scale(1.05);
  }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    min-width: 220px;
    display: none;
    z-index: 1000;
    overflow: hidden;
  }

  .dropdown-menu.show {
    display: block;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .dropdown-item {
    padding: clamp(12px, 3vw, 15px) clamp(16px, 4vw, 20px);
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--dark);
    text-decoration: none;
    transition: all 0.3s;
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
  }

  .dropdown-item:last-child {
    border-bottom: none;
  }

  .dropdown-item:hover {
    background: #f8fafc;
    color: var(--primary);
    padding-left: 25px;
  }

  .dropdown-item i {
    width: 20px;
    color: var(--primary);
  }

  .dropdown-item.logout:hover {
    background: #fee2e2;
    color: var(--danger);
  }

  .dropdown-item.logout i {
    color: var(--danger);
  }

  /* Área de conteúdo rolável */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    margin-top: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) #f1f5f9;
  }

  .content-area::-webkit-scrollbar {
    width: 6px;
  }

  .content-area::-webkit-scrollbar-track {
    background: #f1f5f9;
    border-radius: 10px;
  }

  .content-area::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
  }

  /* Card do formulário */
  .form-card {
    background: white;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(16px, 3vw, 25px);
    margin-bottom: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
  }

  .form-card h3 {
    margin: 0 0 clamp(12px, 2vw, 15px) 0;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: clamp(10px, 2vw, 12px);
    border-bottom: 2px solid #f1f5f9;
  }

  .form-card h3 i {
    color: var(--primary);
    font-size: clamp(1.2rem, 3.5vw, 1.5rem);
  }

  /* Inputs modernos */
  .modern-input, .modern-select {
    width: 100%;
    padding: clamp(10px, 2vw, 12px) clamp(12px, 2.5vw, 15px);
    border: 2px solid #e2e8f0;
    border-radius: clamp(10px, 2vw, 12px);
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    transition: all 0.3s;
    background: white;
  }

  .modern-input:focus, .modern-select:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  /* Botões */
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    padding: clamp(10px, 2vw, 12px) clamp(20px, 4vw, 30px);
    border-radius: clamp(10px, 2vw, 12px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    width: 100%;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
  }

  .btn-secondary {
    background: white;
    color: var(--dark);
    border: 2px solid #e2e8f0;
    padding: clamp(10px, 2vw, 12px) clamp(20px, 4vw, 30px);
    border-radius: clamp(10px, 2vw, 12px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
  }

  .btn-secondary:hover {
    background: #f8fafc;
    border-color: var(--primary);
    color: var(--primary);
  }

  .btn-add {
    background: var(--success);
    color: white;
    border: none;
    padding: clamp(6px, 1.5vw, 8px) clamp(10px, 2.5vw, 15px);
    border-radius: clamp(6px, 1.5vw, 8px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
  }

  .btn-add:hover {
    background: #0d9488;
    transform: translateY(-2px);
  }

  .btn-remove {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
    border: none;
    width: clamp(32px, 6vw, 36px);
    height: clamp(32px, 6vw, 36px);
    border-radius: clamp(6px, 1.5vw, 8px);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.8rem, 2vw, 0.9rem);
    flex-shrink: 0;
  }

  .btn-remove:hover {
    background: var(--danger);
    color: white;
  }

  /* Lista de produtos na venda */
  .produtos-lista {
    background: #f8fafc;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(12px, 2.5vw, 20px);
    margin: 15px 0;
    width: 100%;
  }

  .produtos-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    width: 100%;
  }

  .produtos-header h4 {
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(1rem, 2.5vw, 1.1rem);
  }

  .produto-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    padding: 8px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    width: 100%;
  }

  /* Select do produto */
  .produto-item .produto-select {
    flex: 2;
    min-width: 0;
  }

  /* Input quantidade */
  .produto-item .produto-quantidade {
    flex: 0.4;
    min-width: 70px;
    text-align: center;
    padding: 8px 4px;
  }

  /* Subtotal */
  .produto-subtotal {
    flex: 0.6;
    font-weight: 600;
    color: var(--primary);
    font-size: 0.9rem;
    white-space: nowrap;
    text-align: right;
    padding-right: 5px;
  }

  /* Resumo da venda */
  .resumo-venda {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(12px, 2.5vw, 20px);
    margin-top: 15px;
    width: 100%;
  }

  .resumo-venda h4 {
    margin: 0 0 10px 0;
    font-size: clamp(0.9rem, 2.2vw, 1rem);
    opacity: 0.9;
  }

  .resumo-conteudo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    width: 100%;
  }

  .resumo-info {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .resumo-info div {
    font-size: clamp(0.85rem, 2vw, 0.95rem);
  }

  .resumo-venda .total {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 700;
  }

  /* Container da tabela */
  .table-container {
    background: white;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(12px, 2.5vw, 20px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 25px;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .items-per-page {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .items-per-page select {
    padding: 8px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    background: white;
    color: var(--dark);
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    cursor: pointer;
    outline: none;
    transition: all 0.3s;
  }

  .items-per-page select:hover {
    border-color: var(--primary);
  }

  .items-per-page select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .items-per-page label {
    color: #64748b;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    white-space: nowrap;
  }

  .modern-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 clamp(4px, 1vw, 8px);
    min-width: 800px;
  }

  .modern-table thead th {
    background: #f8fafc;
    padding: clamp(8px, 2vw, 12px) clamp(10px, 2vw, 15px);
    font-weight: 600;
    color: var(--dark);
    text-transform: uppercase;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: 1px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .modern-table tbody tr {
    background: #f8fafc;
    border-radius: 12px;
    transition: all 0.3s;
  }

  .modern-table tbody tr:hover {
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transform: translateX(5px);
  }

  .modern-table td {
    padding: clamp(8px, 2vw, 12px) clamp(10px, 2vw, 15px);
    border: none;
    color: var(--dark);
    font-size: clamp(0.8rem, 2.2vw, 0.95rem);
    vertical-align: middle;
  }

  .modern-table td:first-child {
    border-radius: 12px 0 0 12px;
  }

  .modern-table td:last-child {
    border-radius: 0 12px 12px 0;
  }

  /* Badge de status de pagamento */
  .payment-badge {
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-block;
    white-space: nowrap;
  }

  .payment-badge.dinheiro {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
  }

  .payment-badge.pix {
    background: rgba(37, 99, 235, 0.1);
    color: var(--primary);
  }

  .payment-badge.credito {
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
  }

  .payment-badge.debito {
    background: rgba(139, 92, 246, 0.1);
    color: var(--secondary);
  }

  /* Botões de ação */
  .action-btn {
    width: clamp(28px, 6vw, 38px);
    height: clamp(28px, 6vw, 38px);
    border-radius: clamp(6px, 1.5vw, 8px);
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    font-size: clamp(0.8rem, 2vw, 1rem);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .action-btn.info {
    background: rgba(37, 99, 235, 0.1);
    color: var(--primary);
  }

  .action-btn.info:hover {
    background: var(--primary);
    color: white;
    transform: scale(1.1);
  }

  /* Paginação */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(4px, 1.5vw, 8px);
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .page-btn {
    min-width: clamp(35px, 8vw, 40px);
    height: clamp(35px, 8vw, 40px);
    border-radius: clamp(8px, 2vw, 10px);
    border: 2px solid #e2e8f0;
    background: white;
    color: var(--dark);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
  }

  .page-btn:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    transform: scale(1.05);
  }

  .page-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: clamp(30px, 8vw, 40px) clamp(16px, 4vw, 20px);
  }

  .empty-state i {
    font-size: clamp(40px, 10vw, 50px);
    color: #94a3b8;
    margin-bottom: 15px;
  }

  .empty-state p {
    color: #64748b;
    font-size: clamp(1rem, 3vw, 1.1rem);
    margin: 0;
  }

  /* Modal de detalhes */
  .uk-modal-dialog {
    border-radius: clamp(15px, 4vw, 20px) !important;
    padding: clamp(16px, 4vw, 25px) !important;
    margin: 16px !important;
    max-width: 600px !important;
    width: calc(100% - 32px) !important;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #f1f5f9;
  }

  .modal-header h2 {
    margin: 0;
    font-size: clamp(1.2rem, 4vw, 1.5rem);
    line-height: 1.2;
  }

  .modal-header i {
    font-size: clamp(1.5rem, 5vw, 1.8rem);
  }

  .detail-item {
    background: #f8fafc;
    border-radius: clamp(8px, 2vw, 10px);
    padding: clamp(12px, 3vw, 15px);
    margin-bottom: 10px;
  }

  .detail-label {
    font-size: clamp(0.75rem, 2vw, 0.85rem);
    color: #64748b;
    margin-bottom: 5px;
  }

  .detail-value {
    font-size: clamp(1rem, 3vw, 1.1rem);
    font-weight: 600;
    word-break: break-word;
  }

  .produtos-list {
    max-height: 300px;
    overflow-y: auto;
    margin: 10px 0;
    scrollbar-width: thin;
  }

  .produto-detail-item {
    display: flex;
    justify-content: space-between;
    padding: clamp(8px, 2vw, 10px);
    border-bottom: 1px solid #e2e8f0;
    font-size: clamp(0.85rem, 2.2vw, 0.95rem);
  }

  .produto-detail-item:last-child {
    border-bottom: none;
  }

  .cliente-info {
    background: linear-gradient(135deg, #f8fafc, #f1f5f9);
    border-radius: clamp(8px, 2vw, 10px);
    padding: clamp(12px, 3vw, 15px);
    margin-bottom: 15px;
  }

  .cliente-info p {
    margin: 5px 0;
    font-size: clamp(0.9rem, 2.2vw, 1rem);
  }

  .cliente-info i {
    width: 20px;
    color: var(--primary);
  }

  /* Estilos Select2 personalizados */
  .select2-container--default .select2-selection--single {
    height: 40px !important;
    border: 2px solid #e2e8f0 !important;
    border-radius: 10px !important;
    padding: 5px 10px !important;
    width: 100% !important;
  }

  .select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height: 26px !important;
    font-size: 0.9rem !important;
  }

  .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 36px !important;
  }

  .select2-dropdown {
    border: 2px solid #e2e8f0 !important;
    border-radius: 10px !important;
    overflow: hidden !important;
  }

  .select2-search__field {
    padding: 8px !important;
    border: 2px solid #e2e8f0 !important;
    border-radius: 8px !important;
    font-size: 0.9rem !important;
  }

  .select2-results__option {
    padding: 8px 12px !important;
    font-size: 0.9rem !important;
  }

  .select2-results__option--highlighted {
    background: var(--primary) !important;
  }

  /* ===== RESPONSIVO MOBILE ===== */
  @media (max-width: 768px) {
    .produto-item {
      gap: 6px;
    }
    
    .produto-item .produto-select,
    .produto-item .select2-container {
      flex: 1.2 !important;
      min-width: 0 !important;
    }
    
    .produto-item .produto-quantidade {
      flex: 0 0 65px;
      min-width: 65px;
      max-width: 65px;
    }
    
    .produto-subtotal {
      flex: 0 0 70px;
      font-size: 0.8rem;
      padding-right: 2px;
    }
    
    .produto-item .btn-remove {
      flex: 0 0 32px;
    }
  }

  @media (max-width: 640px) {
    .uk-container {
      height: calc(100vh - 16px);
    }

    .produto-item {
      gap: 4px;
      padding: 6px;
    }
    
    .produto-item .produto-select,
    .produto-item .select2-container {
      flex: 1 !important;
    }
    
    .produto-item .produto-quantidade {
      flex: 0 0 55px;
      min-width: 55px;
      max-width: 55px;
      padding: 6px 2px;
      font-size: 0.85rem;
    }
    
    .produto-subtotal {
      flex: 0 0 60px;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .btn-add {
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    
    .resumo-conteudo {
      flex-direction: column;

<script src="api.js"></script>
<script>

// Verificar autenticação
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

// Variáveis globais
let produtos = [];
let clientes = [];
let todasVendas = [];
let vendasFiltradas = [];
let paginaAtual = 1;
let itensPorPagina = 10;

// Menu hamburguer
function toggleMenu() {
  document.getElementById('dropdownMenu').classList.toggle('show');
}

// Fechar menu ao clicar fora
document.addEventListener('click', function(event) {
  if (!event.target.closest('.menu-container')) {
    document.getElementById('dropdownMenu').classList.remove('show');
  }
});

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

// Funções auxiliares
function formatarMoeda(valor) {
  return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatarDataHora(data) {
  return new Date(data).toLocaleString('pt-BR');
}

function formatarDataParaInput(data) {
  const d = new Date(data);
  return d.toISOString().slice(0, 16);
}

function getFormaPagamentoIcon(forma) {
  const icons = {
    'dinheiro': '💵',
    'pix': '📱',
    'credito': '💳',
    'debito': '💳'
  };
  return icons[forma] || '💰';
}

function getFormaPagamentoNome(forma) {
  const nomes = {
    'dinheiro': 'Dinheiro',
    'pix': 'Pix',
    'credito': 'Cartão de Crédito',
    'debito': 'Cartão de Débito'
  };
  return nomes[forma] || forma;
}

// Funções de paginação
function mudarItensPorPagina(valor) {
  if (valor === 'todos') {
    itensPorPagina = vendasFiltradas.length;
  } else {
    itensPorPagina = parseInt(valor);
  }
  paginaAtual = 1;
  renderizarPaginacao();
  renderizarTabelaVendas();
}

// Inicializar Select2 para busca
function inicializarSelect2() {
  // Select de clientes
  $('#cliente').select2({
    placeholder: 'Buscar cliente por nome...',
    allowClear: true,
    language: 'pt-BR',
    width: '100%',
    dropdownParent: $('.uk-container')
  });
}

// Carregar dados iniciais
async function carregarDados() {
  try {
    // Definir data atual no campo de data
    const agora = new Date();
    agora.setHours(agora.getHours() - 3); // Ajuste para fuso horário
    document.getElementById('dataVenda').value = formatarDataParaInput(agora);
    
    // Carregar produtos
    const pRes = await fetch(API + "/produtos", {
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });
    produtos = await pRes.json();
    console.log('Produtos carregados:', produtos.length);
    
    // Carregar clientes
    const cRes = await fetch(API + "/clientes", {
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });
    clientes = await cRes.json();
    
    // Carregar vendas
    const vRes = await fetch(API + "/vendas", {
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });
    todasVendas = await vRes.json();
    vendasFiltradas = [...todasVendas];
    
    // Ordenar por data (mais recentes primeiro)
    vendasFiltradas.sort((a, b) => new Date(b.dataVenda || b.createdAt) - new Date(a.dataVenda || a.createdAt));
    
    // Atualizar total de vendas
    document.getElementById('totalVendas').innerText = `Total: ${todasVendas.length}`;
    
    // Popular selects
    popularSelects();
    
    // Inicializar Select2
    inicializarSelect2();
    
    // Adicionar primeira linha de produto
    adicionarProdutoLinha();
    
    // Renderizar tabela de vendas
    paginaAtual = 1;
    renderizarPaginacao();
    renderizarTabelaVendas();
    
  } catch (error) {
    console.error('Erro ao carregar dados:', error);
    UIkit.notification({
      message: '<i class="fas fa-exclamation-circle"></i> Erro ao carregar dados',
      status: 'danger'
    });
  }
}

function popularSelects() {
  // Select cliente principal
  const selectCliente = document.getElementById('cliente');
  selectCliente.innerHTML = '<option value="">Selecione um cliente...</option>';
  clientes.forEach(c => {
    selectCliente.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
  });
}

// Adicionar nova linha de produto
function adicionarProdutoLinha() {
  const container = document.getElementById('produtos-container');
  const index = container.children.length;
  
  const div = document.createElement('div');
  div.className = 'produto-item';
  div.id = `produto-linha-${index}`;
  
  // Criar select com options
  let options = '<option value="">Buscar produto...</option>';
  produtos.forEach(p => {
    options += `<option value="${p.id}" data-preco="${p.precoVenda}" data-estoque="${p.estoque}" data-referencia="${p.referencia || ''}">${p.referencia ? '['+p.referencia+'] ' : ''}${p.nome} (R$ ${formatarMoeda(p.precoVenda)} - Estq: ${p.estoque})</option>`;
  });
  
  div.innerHTML = `
    <select class="modern-select produto-select" data-index="${index}" style="width: 100%;">
      ${options}
    </select>
    <input type="number" class="modern-input produto-quantidade" min="1" value="1" placeholder="Qtd" oninput="atualizarPreview(${index})" data-index="${index}">
    <span class="produto-subtotal" id="subtotal-${index}">R$ 0,00</span>
    <button class="btn-remove" onclick="removerProdutoLinha(${index})">
      <i class="fas fa-trash"></i>
    </button>
  `;
  
  container.appendChild(div);
  
  // Inicializar Select2 na nova linha
  $(`#produto-linha-${index} .produto-select`).select2({
    placeholder: 'Buscar por nome ou referência...',
    allowClear: true,
    language: 'pt-BR',
    width: '100%',
    dropdownParent: $(`#produto-linha-${index}`),
    templateResult: formatarResultadoProduto,
    templateSelection: formatarSelecaoProduto,
    matcher: function(params, data) {
      if ($.trim(params.term) === '') {
        return data;
      }
      
      const termo = params.term.toLowerCase();
      const texto = data.text.toLowerCase();
      const referencia = $(data.element).data('referencia');
      
      if (texto.indexOf(termo) > -1 || (referencia && referencia.toLowerCase().indexOf(termo) > -1)) {
        return data;
      }
      
      return null;
    }
  }).on('select2:select', function(e) {
    const index = $(this).data('index');
    atualizarPreview(index);
  });
  
  atualizarPreview(index);
}

// Formatar resultado da busca do produto
function formatarResultadoProduto(item) {
  if (!item.id) return item.text;
  
  const element = item.element;
  const referencia = $(element).data('referencia');
  const preco = $(element).data('preco');
  const estoque = $(element).data('estoque');
  
  if (referencia) {
    return $('<span><strong>[' + referencia + ']</strong> ' + item.text + ' <small style="color: #666;">R$ ' + formatarMoeda(preco) + ' | Estq: ' + estoque + '</small></span>');
  }
  
  return $('<span>' + item.text + ' <small style="color: #666;">R$ ' + formatarMoeda(preco) + ' | Estq: ' + estoque + '</small></span>');
}

function formatarSelecaoProduto(item) {
  if (!item.id) return item.text;
  
  const element = item.element;
  const referencia = $(element).data('referencia');
  
  if (referencia) {
    return '[' + referencia + '] ' + item.text;
  }
  
  return item.text;
}

// Remover linha de produto
function removerProdutoLinha(index) {
  const linha = document.getElementById(`produto-linha-${index}`);
  if (linha) {
    // Destruir Select2 antes de remover
    $(linha).find('.produto-select').select2('destroy');
    linha.remove();
    // Reindexar linhas restantes
    reindexarLinhas();
  }
  calcularTotal();
}

// Reindexar linhas após remoção
function reindexarLinhas() {
  const container = document.getElementById('produtos-container');
  const linhas = container.children;
  
  for (let i = 0; i < linhas.length; i++) {
    const linha = linhas[i];
    const oldId = linha.id;
    linha.id = `produto-linha-${i}`;
    
    const select = linha.querySelector('.produto-select');
    const oldIndex = select.dataset.index;
    select.dataset.index = i;
    
    // Atualizar Select2
    $(select).select2('destroy');
    $(select).select2({
      placeholder: 'Buscar por nome ou referência...',
      allowClear: true,
      language: 'pt-BR',
      width: '100%',
      dropdownParent: $(linha),
      templateResult: formatarResultadoProduto,
      templateSelection: formatarSelecaoProduto,
      matcher: function(params, data) {
        if ($.trim(params.term) === '') {
          return data;
        }
        
        const termo = params.term.toLowerCase();
        const texto = data.text.toLowerCase();
        const referencia = $(data.element).data('referencia');
        
        if (texto.indexOf(termo) > -1 || (referencia && referencia.toLowerCase().indexOf(termo) > -1)) {
          return data;
        }
        
        return null;
      }
    }).on('select2:select', function(e) {
      const index = $(this).data('index');
      atualizarPreview(index);
    });
    
    const input = linha.querySelector('.produto-quantidade');
    input.dataset.index = i;
    input.setAttribute('oninput', `atualizarPreview(${i})`);
    
    const subtotal = linha.querySelector('.produto-subtotal');
    subtotal.id = `subtotal-${i}`;
    
    const btn = linha.querySelector('.btn-remove');
    btn.setAttribute('onclick', `removerProdutoLinha(${i})`);
  }
}

// Atualizar preview de uma linha
function atualizarPreview(index) {
  const select = document.querySelector(`.produto-select[data-index="${index}"]`);
  const quantidade = document.querySelector(`.produto-quantidade[data-index="${index}"]`);
  const subtotalSpan = document.getElementById(`subtotal-${index}`);
  
  if (select && quantidade && subtotalSpan) {
    const option = select.options[select.selectedIndex];
    if (option.value) {
      const preco = parseFloat(option.dataset.preco);
      const qtd = parseInt(quantidade.value) || 0;
      const subtotal = preco * qtd;
      subtotalSpan.textContent = `R$ ${formatarMoeda(subtotal)}`;
    } else {
      subtotalSpan.textContent = 'R$ 0,00';
    }
  }
  
  calcularTotal();
}

// Calcular total da venda
function calcularTotal() {
  const linhas = document.getElementById('produtos-container').children;
  let totalItens = 0;
  let totalProdutos = 0;
  let totalVenda = 0;
  
  for (let i = 0; i < linhas.length; i++) {
    const select = linhas[i].querySelector('.produto-select');
    const quantidade = linhas[i].querySelector('.produto-quantidade');
    
    if (select && select.value && quantidade && quantidade.value) {
      const option = select.options[select.selectedIndex];
      const preco = parseFloat(option.dataset.preco);
      const qtd = parseInt(quantidade.value) || 0;
      
      totalItens += qtd;
      totalProdutos++;
      totalVenda += preco * qtd;
    }
  }
  
  document.getElementById('totalItens').textContent = totalItens;
  document.getElementById('totalProdutos').textContent = totalProdutos;
  document.getElementById('totalVenda').textContent = `R$ ${formatarMoeda(totalVenda)}`;
  
  return totalVenda;
}

// Validar estoque antes de finalizar
function validarEstoque() {
  const linhas = document.getElementById('produtos-container').children;
  const erros = [];
  
  for (let i = 0; i < linhas.length; i++) {
    const select = linhas[i].querySelector('.produto-select');
    const quantidade = linhas[i].querySelector('.produto-quantidade');
    
    if (select && select.value && quantidade && quantidade.value) {
      const option = select.options[select.selectedIndex];
      const estoque = parseInt(option.dataset.estoque);
      const qtd = parseInt(quantidade.value) || 0;
      
      if (qtd > estoque) {
        erros.push(`Estoque insuficiente para ${option.text.split('(')[0].trim()}. Disponível: ${estoque}`);
      }
    }
  }
  
  return erros;
}

// Salvar venda
async function salvarVenda() {
  const clienteId = document.getElementById('cliente').value;
  const formaPagamento = document.getElementById('formaPagamento').value;
  const dataVenda = document.getElementById('dataVenda').value;
  
  if (!clienteId) {
    UIkit.notification({
      message: '<i class="fas fa-exclamation-triangle"></i> Selecione um cliente!',
      status: 'warning'
    });
    return;
  }
  
  const linhas = document.getElementById('produtos-container').children;
  const produtosVenda = [];
  
  for (let i = 0; i < linhas.length; i++) {
    const select = linhas[i].querySelector('.produto-select');
    const quantidade = linhas[i].querySelector('.produto-quantidade');
    
    if (select && select.value && quantidade && quantidade.value) {
      produtosVenda.push({
        produtoId: select.value,
        quantidade: parseInt(quantidade.value) || 0
      });
    }
  }
  
  if (produtosVenda.length === 0) {
    UIkit.notification({
      message: '<i class="fas fa-exclamation-triangle"></i> Adicione pelo menos um produto!',
      status: 'warning'
    });
    return;
  }
  
  // Validar estoque
  const erros = validarEstoque();
  if (erros.length > 0) {
    UIkit.modal.alert(erros.join('<br>'));
    return;
  }
  
  try {
    const res = await fetch(API + "/vendas", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify({
        clienteId,
        produtos: produtosVenda,
        formaPagamento,
        dataVenda
      })
    });
    
    if (res.ok) {
      UIkit.notification({
        message: '<i class="fas fa-check-circle"></i> Venda registrada com sucesso!',
        status: 'success'
      });
      
      // Limpar formulário
      document.getElementById('cliente').value = '';
      $('#cliente').val(null).trigger('change');
      
      document.getElementById('formaPagamento').value = 'dinheiro';
      
      // Limpar produtos
      const container = document.getElementById('produtos-container');
      while (container.firstChild) {
        const linha = container.firstChild;
        $(linha).find('.produto-select').select2('destroy');
        container.removeChild(linha);
      }
      
      adicionarProdutoLinha();
      
      // Atualizar data
      const agora = new Date();
      agora.setHours(agora.getHours() - 3);
      document.getElementById('dataVenda').value = formatarDataParaInput(agora);
      
      // Recarregar dados
      await carregarDados();
      
    } else {
      const error = await res.json();
      UIkit.notification({
        message: '<i class="fas fa-exclamation-circle"></i> ' + (error.error || 'Erro ao registrar venda'),
        status: 'danger'
      });
    }
    
  } catch (error) {
    console.error('Erro:', error);
    UIkit.notification({
      message: '<i class="fas fa-exclamation-circle"></i> Erro ao registrar venda',
      status: 'danger'
    });
  }
}

// Funções da tabela de vendas
function renderizarPaginacao() {
  const totalPaginas = Math.ceil(vendasFiltradas.length / itensPorPagina);
  const paginacao = document.getElementById('paginacao');
  
  if (vendasFiltradas.length <= itensPorPagina || totalPaginas <= 1) {
    paginacao.innerHTML = '';
    return;
  }
  
  let html = '';
  
  html += `<button class="page-btn" onclick="mudarPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>
    <i class="fas fa-chevron-left"></i>
  </button>`;
  
  for (let i = 1; i <= totalPaginas; i++) {
    if (i === 1 || i === totalPaginas || (i >= paginaAtual - 1 && i <= paginaAtual + 1)) {
      html += `<button class="page-btn ${i === paginaAtual ? 'active' : ''}" onclick="mudarPagina(${i})">${i}</button>`;
    } else if (i === paginaAtual - 2 || i === paginaAtual + 2) {
      html += `<button class="page-btn" disabled>...</button>`;
    }
  }
  
  html += `<button class="page-btn" onclick="mudarPagina(${paginaAtual + 1})" ${paginaAtual === totalPaginas ? 'disabled' : ''}>
    <i class="fas fa-chevron-right"></i>
  </button>`;
  
  paginacao.innerHTML = html;
}

function mudarPagina(novaPagina) {
  const totalPaginas = Math.ceil(vendasFiltradas.length / itensPorPagina);
  if (novaPagina >= 1 && novaPagina <= totalPaginas) {
    paginaAtual = novaPagina;
    renderizarPaginacao();
    renderizarTabelaVendas();
  }
}

function renderizarTabelaVendas() {
  const inicio = (paginaAtual - 1) * itensPorPagina;
  const fim = Math.min(inicio + itensPorPagina, vendasFiltradas.length);
  const vendasPagina = vendasFiltradas.slice(inicio, fim);
  
  const lista = document.getElementById('listaVendas');
  lista.innerHTML = "";
  
  vendasPagina.forEach(v => {
    const cliente = v.cliente || { nome: 'Cliente não encontrado' };
    const totalItens = v.itens ? v.itens.reduce((acc, i) => acc + i.quantidade, 0) : 0;
    
    let produtosLista = 'N/A';
    if (v.itens && v.itens.length > 0) {
      produtosLista = v.itens.map(i => {
        return i.produto ? i.produto.nome : 'Produto não encontrado';
      }).join(', ');
    }
    
    lista.innerHTML += `
      <tr>
        <td>${formatarDataHora(v.dataVenda || v.createdAt)}</td>
        <td><strong>${cliente.nome}</strong></td>
        <td>${produtosLista.substring(0, 30)}${produtosLista.length > 30 ? '...' : ''}</td>
        <td>${totalItens} unid</td>
        <td><strong>R$ ${formatarMoeda(v.total)}</strong></td>
        <td>
          <span class="payment-badge ${v.formaPagamento || 'dinheiro'}">
            ${getFormaPagamentoIcon(v.formaPagamento)} ${getFormaPagamentoNome(v.formaPagamento)}
          </span>
        </td>
        <td>
          <button onclick="verDetalhesVenda('${v.id}')" 
                  class="action-btn info" title="Detalhes">
            <i class="fas fa-eye"></i>
          </button>
        </td>
      </tr>`;
  });
  
  if (vendasPagina.length === 0) {
    lista.innerHTML = `
      <tr>
        <td colspan="7">
          <div class="empty-state">
            <i class="fas fa-shopping-cart"></i>
            <p>Nenhuma venda encontrada</p>
          </div>
        </td>
      </tr>`;
  }
}

function verDetalhesVenda(id) {
  const venda = todasVendas.find(v => v.id == id);
  if (!venda) {
    console.error('Venda não encontrada:', id);
    return;
  }
  
  const cliente = venda.cliente || { nome: 'N/A', telefone: 'N/A' };
  
  let produtosHtml = '<div class="produtos-list">';
  let subtotal = 0;
  
  if (venda.itens && venda.itens.length > 0) {
    venda.itens.forEach(item => {
      const produto = item.produto || { nome: 'N/A', precoVenda: 0, referencia: 'N/A' };
      const valorItem = item.subtotal || (produto.precoVenda * item.quantidade);
      subtotal += valorItem;
      
      produtosHtml += `
        <div class="produto-detail-item">
          <div>
            <strong>${produto.nome}</strong><br>
            <small>Ref: ${produto.referencia || 'N/A'} | Qtd: ${item.quantidade}x | Preço: R$ ${formatarMoeda(produto.precoVenda || 0)}</small>
          </div>
          <span style="font-weight: 600;">R$ ${formatarMoeda(valorItem)}</span>
        </div>
      `;
    });
  } else {
    produtosHtml += '<p style="text-align: center; color: #64748b;">Nenhum produto nesta venda</p>';
  }
  produtosHtml += '</div>';
  
  const detalhes = document.getElementById('detalhesVenda');
  
  detalhes.innerHTML = `
    <div class="cliente-info">
      <p><i class="fas fa-user"></i> <strong>${cliente.nome}</strong></p>
      <p><i class="fas fa-phone"></i> ${cliente.telefone || 'N/A'}</p>
    </div>

    <div class="detail-item">
      <div class="detail-label">📅 Data da Venda</div>
      <div class="detail-value">${formatarDataHora(venda.dataVenda || venda.createdAt)}</div>
    </div>
    
    <div class="detail-item">
      <div class="detail-label">📦 Produtos</div>
      ${produtosHtml}
    </div>
    
    <div class="detail-item">
      <div class="detail-label">💰 Resumo Financeiro</div>
      <div style="display: flex; justify-content: space-between; margin-top: 10px;">
        <span>Subtotal:</span>
        <span>R$ ${formatarMoeda(subtotal)}</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-weight: bold; color: var(--success); font-size: 1.2rem; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0;">
        <span>Total:</span>
        <span>R$ ${formatarMoeda(venda.total)}</span>
      </div>
    </div>
    
    <div class="detail-item">
      <div class="detail-label">💳 Forma de Pagamento</div>
      <div class="detail-value">${getFormaPagamentoIcon(venda.formaPagamento)} ${getFormaPagamentoNome(venda.formaPagamento)}</div>
    </div>
  `;
  
  // Abrir o modal
  if (typeof UIkit !== 'undefined') {
    UIkit.modal('#modalDetalhesVenda').show();
  }
}

// Inicializar
carregarDados();
</script>
