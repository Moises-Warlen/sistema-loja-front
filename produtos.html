<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Produtos</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/css/uikit.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit-icons.min.js"></script>
</head>
<body class="uk-container">

<h2 class="uk-margin-top">Produtos</h2>

<div class="uk-grid-small" uk-grid>
<input id="nome" class="uk-input uk-width-1-3@m" placeholder="Nome">
<input id="preco" type="number" class="uk-input uk-width-1-3@m" placeholder="Preço">
<input id="quantidade" type="number" class="uk-input uk-width-1-3@m" placeholder="Quantidade">
<button onclick="salvar()" class="uk-button uk-button-primary">Salvar</button>
</div>

<table class="uk-table uk-table-striped uk-margin">
<thead>
<tr>
<th>Nome</th>
<th>Preço</th>
<th>Qtd</th>
<th>Data Cadastro</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<script>
const API="https://sistema-loja-api.onrender.com";

async function salvar(){
await fetch(API+"/produtos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome:nome.value,
preco:Number(preco.value),
quantidade:Number(quantidade.value)
})
});
listar();
}

async function listar(){
const res=await fetch(API+"/produtos");
const data=await res.json();
lista.innerHTML="";
data.forEach(p=>{
lista.innerHTML+=`
<tr>
<td>${p.nome}</td>
<td>R$ ${p.preco}</td>
<td>${p.quantidade}</td>
<td>${new Date(p.dataCadastro).toLocaleDateString()}</td>
</tr>`;
});
}
listar();
</script>

</body>
</html>
