<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Produtos - Mariá Skincare</title>

<!-- UIkit -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/css/uikit.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.19.4/dist/js/uikit-icons.min.js"></script>
<!-- Ícone da página (favicon) -->
  <link rel="icon" type="image/png" href="logo-m.ico">

<!-- Input mask -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  :root {
    --primary: #2563eb;
    --secondary: #7c3aed;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --dark: #1e293b;
    --light: #f8fafc;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .uk-container {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: clamp(20px, 5vw, 40px);
    box-shadow: 0 30px 70px rgba(0,0,0,0.3);
    padding: clamp(16px, 4vw, 30px) !important;
    width: 100%;
    max-width: 1400px !important;
    margin: 0 auto;
    height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header fixo */
  .page-header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    margin: calc(clamp(16px, 4vw, 30px) * -1) calc(clamp(16px, 4vw, 30px) * -1) 0 calc(clamp(16px, 4vw, 30px) * -1);
    padding: clamp(16px, 3vw, 25px) clamp(20px, 4vw, 30px);
    border-radius: clamp(20px, 5vw, 40px) clamp(20px, 5vw, 40px) 0 0;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    flex-shrink: 0;
  }

  .page-header h1 {
    font-size: clamp(1.3rem, 4vw, 2rem);
    margin: 0;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.2;
  }

  /* Menu Hamburguer */
  .menu-container {
    position: relative;
  }

  .hamburger-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    color: white;
    width: clamp(40px, 8vw, 45px);
    height: clamp(40px, 8vw, 45px);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    font-size: clamp(1.1rem, 3vw, 1.3rem);
  }

  .hamburger-btn:hover {
    background: white;
    color: var(--primary);
    border-color: white;
    transform: scale(1.05);
  }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    min-width: 220px;
    display: none;
    z-index: 1000;
    overflow: hidden;
  }

  .dropdown-menu.show {
    display: block;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .dropdown-item {
    padding: clamp(12px, 3vw, 15px) clamp(16px, 4vw, 20px);
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--dark);
    text-decoration: none;
    transition: all 0.3s;
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
  }

  .dropdown-item:last-child {
    border-bottom: none;
  }

  .dropdown-item:hover {
    background: #f8fafc;
    color: var(--primary);
    padding-left: 25px;
  }

  .dropdown-item i {
    width: 20px;
    color: var(--primary);
  }

  .dropdown-item.logout:hover {
    background: #fee2e2;
    color: var(--danger);
  }

  .dropdown-item.logout i {
    color: var(--danger);
  }

  /* Área de conteúdo rolável */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    margin-top: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) #f1f5f9;
  }

  .content-area::-webkit-scrollbar {
    width: 6px;
  }

  .content-area::-webkit-scrollbar-track {
    background: #f1f5f9;
    border-radius: 10px;
  }

  .content-area::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
  }

  /* ===================== PESQUISA ===================== */
  .search-section {
    margin-bottom: 20px;
    width: 100%;
  }

  .search-wrapper {
    position: relative;
    width: 100%;
    max-width: min(400px, 100%);
  }

  .search-wrapper i {
    position: absolute;
    left: clamp(12px, 3vw, 15px);
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: clamp(1rem, 2.5vw, 1.1rem);
    z-index: 1;
  }

  .search-wrapper input {
    padding-left: clamp(40px, 10vw, 45px);
    height: clamp(40px, 8vw, 50px);
    border-radius: 25px;
    border: 2px solid #e2e8f0;
    width: 100%;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    transition: all 0.3s;
    box-sizing: border-box;
  }

  .search-wrapper input:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  /* Card do formulário */
  .form-card {
    background: white;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(16px, 3vw, 25px);
    margin-bottom: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
  }

  .form-card h3 {
    margin: 0 0 clamp(12px, 2vw, 15px) 0;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: clamp(10px, 2vw, 12px);
    border-bottom: 2px solid #f1f5f9;
  }

  .form-card h3 i {
    color: var(--primary);
    font-size: clamp(1.2rem, 3.5vw, 1.5rem);
  }

  /* Inputs */
  .modern-input {
    width: 100%;
    padding: clamp(8px, 2vw, 12px) clamp(10px, 2.5vw, 15px);
    border: 2px solid #e2e8f0;
    border-radius: clamp(8px, 2vw, 10px);
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    transition: all 0.3s;
    box-sizing: border-box;
  }

  .modern-input:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  /* Campo de referência readonly */
  .modern-input[readonly] {
    background-color: #f1f5f9;
    cursor: not-allowed;
    opacity: 0.8;
  }

  /* Botões */
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 30px);
    border-radius: clamp(8px, 2vw, 10px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    width: 100%;
    margin-bottom: 8px;
    box-sizing: border-box;
  }

  @media (min-width: 640px) {
    .btn-primary {
      width: auto;
      margin-bottom: 0;
      margin-right: 8px;
    }
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
  }

  .btn-secondary {
    background: white;
    color: var(--dark);
    border: 2px solid #e2e8f0;
    padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 30px);
    border-radius: clamp(8px, 2vw, 10px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    width: 100%;
    box-sizing: border-box;
  }

  @media (min-width: 640px) {
    .btn-secondary {
      width: auto;
    }
  }

  .btn-secondary:hover {
    background: #f8fafc;
    border-color: var(--primary);
    color: var(--primary);
  }

  /* Container da tabela */
  .table-container {
    background: white;
    border-radius: clamp(12px, 3vw, 15px);
    padding: clamp(12px, 2.5vw, 20px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Cabeçalho da tabela com seletor de itens por página */
  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* Seletor de itens por página */
  .items-per-page {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .items-per-page select {
    padding: 8px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    background: white;
    color: var(--dark);
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    cursor: pointer;
    outline: none;
    transition: all 0.3s;
  }

  .items-per-page select:hover {
    border-color: var(--primary);
  }

  .items-per-page select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .items-per-page label {
    color: #64748b;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    white-space: nowrap;
  }

  /* Tabela */
  .modern-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 clamp(4px, 1vw, 8px);
    min-width: 900px;
  }

  .modern-table thead th {
    background: #f8fafc;
    padding: clamp(8px, 2vw, 15px) clamp(6px, 1.5vw, 15px);
    font-weight: 600;
    color: var(--dark);
    text-transform: uppercase;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: 1px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .modern-table tbody tr {
    background: #f8fafc;
    border-radius: 12px;
    transition: all 0.3s;
  }

  .modern-table tbody tr:hover {
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transform: translateX(5px);
  }

  .modern-table td {
    padding: clamp(8px, 2vw, 15px) clamp(6px, 1.5vw, 15px);
    border: none;
    color: var(--dark);
    font-size: clamp(0.8rem, 2.2vw, 1rem);
    vertical-align: middle;
  }

  .modern-table td:first-child {
    border-radius: 12px 0 0 12px;
  }

  .modern-table td:last-child {
    border-radius: 0 12px 12px 0;
  }

  /* Badges */
  .stock-badge {
    padding: clamp(4px, 1vw, 8px) clamp(6px, 1.5vw, 12px);
    border-radius: 20px;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    font-weight: 600;
    display: inline-block;
    white-space: nowrap;
  }

  .stock-badge.normal {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
  }

  .stock-badge.baixo {
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
  }

  .stock-badge.falta {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
  }

  /* Botões de ação */
  .action-buttons {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .action-btn {
    width: clamp(28px, 6vw, 38px);
    height: clamp(28px, 6vw, 38px);
    border-radius: clamp(6px, 1.5vw, 8px);
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    font-size: clamp(0.8rem, 2vw, 1rem);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .action-btn.info {
    background: rgba(37, 99, 235, 0.1);
    color: var(--primary);
  }

  .action-btn.info:hover {
    background: var(--primary);
    color: white;
    transform: scale(1.1);
  }

  .action-btn.edit {
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
  }

  .action-btn.edit:hover {
    background: var(--warning);
    color: white;
    transform: scale(1.1);
  }

  .action-btn.delete {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
  }

  .action-btn.delete:hover {
    background: var(--danger);
    color: white;
    transform: scale(1.1);
  }

  /* Paginação */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(4px, 1.5vw, 8px);
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .page-btn {
    min-width: clamp(35px, 8vw, 40px);
    height: clamp(35px, 8vw, 40px);
    border-radius: clamp(8px, 2vw, 10px);
    border: 2px solid #e2e8f0;
    background: white;
    color: var(--dark);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
  }

  .page-btn:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    transform: scale(1.05);
  }

  .page-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Modal */
  .uk-modal-dialog {
    border-radius: clamp(15px, 4vw, 20px) !important;
    padding: clamp(16px, 4vw, 30px) !important;
    margin: 16px !important;
    max-width: 500px !important;
    width: calc(100% - 32px) !important;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #f1f5f9;
  }

  .modal-header h2 {
    margin: 0;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: var(--dark);
    line-height: 1.2;
  }

  .modal-header i {
    font-size: clamp(1.5rem, 5vw, 1.8rem);
  }

  .detail-item {
    background: #f8fafc;
    border-radius: 12px;
    padding: clamp(12px, 3vw, 15px);
    margin-bottom: 10px;
  }

  .detail-label {
    font-size: clamp(0.75rem, 2vw, 0.85rem);
    color: #64748b;
    margin-bottom: 5px;
  }

  .detail-value {
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 600;
    color: var(--dark);
    word-break: break-word;
  }

  /* Loading e estados vazios */
  .empty-state {
    text-align: center;
    padding: clamp(30px, 8vw, 40px) clamp(16px, 4vw, 20px);
  }

  .empty-state i {
    font-size: clamp(40px, 10vw, 50px);
    color: #94a3b8;
    margin-bottom: 15px;
  }

  .empty-state p {
    color: #64748b;
    font-size: clamp(1rem, 3vw, 1.1rem);
    margin: 0;
  }

  /* Breakpoints específicos */
  @media (max-width: 640px) {
    .uk-grid-small {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .uk-width-1-2\@s,
    .uk-width-1-5\@l {
      width: 100% !important;
    }

    .form-card h3 {
      margin-bottom: 16px;
    }

    .uk-container {
      height: calc(100vh - 16px);
    }

    .action-buttons {
      justify-content: flex-end;
    }

    .table-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .items-per-page {
      width: 100%;
    }

    .items-per-page select {
      flex: 1;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 8px;
    }

    .page-header h1 {
      font-size: 1.2rem;
    }

    .dropdown-menu {
      min-width: 200px;
      right: -10px;
    }

    .modern-table td {
      white-space: normal;
      word-break: break-word;
    }

    .action-btn {
      width: 32px;
      height: 32px;
    }

    .uk-container {
      height: calc(100vh - 16px);
    }
  }

  @media (max-width: 360px) {
    .page-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .menu-container {
      align-self: flex-end;
    }

    .stock-badge {
      padding: 2px 6px;
      font-size: 0.7rem;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      font-size: 0.8rem;
    }
  }

  /* Suporte para orientação paisagem */
  @media (max-height: 600px) and (orientation: landscape) {
    .uk-container {
      height: calc(100vh - 32px);
    }

    .form-card {
      padding: 12px;
    }

    .modern-table td {
      padding: 8px;
    }

    .search-section {
      margin-bottom: 12px;
    }
  }

  /* Acessibilidade */
  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Ajustes para o grid do UIKit */
  .uk-grid-small {
    margin-left: -10px;
  }

  .uk-grid-small > * {
    padding-left: 10px;
  }
 .texto-branco-gradiente {
  background: linear-gradient(135deg, #ffffff, #f0f0f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
</style>

</head>

<body>

<div class="uk-container">

  <!-- HEADER COM MENU HAMBURGUER -->
  <div class="page-header">
   <h1 class="texto-branco-gradiente">
  <i class="fas fa-box"></i>
  Produtos
</h1>
    
    <div class="menu-container">
      <div class="hamburger-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
      </div>
      
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="index.html" class="dropdown-item">
          <i class="fas fa-home"></i>
          Dashboard
        </a>
        <a href="clientes.html" class="dropdown-item">
          <i class="fas fa-users"></i>
          Clientes
        </a>
        <a href="vendas.html" class="dropdown-item">
          <i class="fas fa-shopping-cart"></i>
          Vendas
        </a>
        <a href="relatorio.html" class="dropdown-item">
          <i class="fas fa-chart-line"></i>
          Relatórios
        </a>
        <div class="dropdown-item logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          Sair
        </div>
      </div>
    </div>
  </div>

  <!-- Área de conteúdo rolável -->
  <div class="content-area">

    <!-- PESQUISA -->
    <div class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input 
          type="text" 
          id="pesquisa" 
          placeholder="Pesquisar produtos por nome ou referência..." 
          onkeyup="filtrarProdutos()"
          class="modern-input"
        >
      </div>
    </div>

    <!-- FORMULÁRIO DE CADASTRO -->
    <div class="form-card">
      <h3>
        <i class="fas fa-plus-circle"></i>
        Novo Produto
      </h3>
      
      <div class="uk-grid-small" uk-grid>
        <div class="uk-width-1-2@s uk-width-1-5@l">
          <label class="form-label">Referência</label>
          <input id="referencia" class="modern-input" readonly placeholder="">
        </div>
        
        <div class="uk-width-1-2@s uk-width-1-5@l">
          <label class="form-label">Nome do Produto *</label>
          <input id="nome" class="modern-input" placeholder="Ex: Hidratante Facial">
        </div>

        <div class="uk-width-1-2@s uk-width-1-5@l">
          <label class="form-label">Preço de Compra *</label>
          <input id="precoCompra" type="text" class="modern-input preco-mask" placeholder="R$ 0,00">
        </div>

        <div class="uk-width-1-2@s uk-width-1-5@l">
          <label class="form-label">Preço de Venda *</label>
          <input id="precoVenda" type="text" class="modern-input preco-mask" placeholder="R$ 0,00">
        </div>

        <div class="uk-width-1-2@s uk-width-1-5@l">
          <label class="form-label">Estoque Inicial *</label>
          <input id="estoque" type="number" min="0" class="modern-input" placeholder="0">
        </div>

        <div class="uk-width-1-1 uk-margin-top">
          <button onclick="salvar()" class="btn-primary">
            <i class="fas fa-save"></i>
            Salvar Produto
          </button>
          <button onclick="limparForm()" class="btn-secondary">
            <i class="fas fa-eraser"></i>
            Limpar
          </button>
        </div>
      </div>
    </div>

    <!-- TABELA DE PRODUTOS -->
    <div class="table-container">
      <div class="table-header">
        <div style="display: flex; align-items: center; gap: 8px;">
          <i class="fas fa-list" style="color: var(--primary); font-size: 1.2rem;"></i>
          <h3 style="margin: 0; font-size: clamp(1rem, 3vw, 1.2rem);">Lista de Produtos</h3>
        </div>
        
        <div class="items-per-page">
          <label for="itensPorPagina">Itens por página:</label>
          <select id="itensPorPagina" onchange="mudarItensPorPagina(this.value)">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="todos">Todos</option>
          </select>
        </div>
      </div>
      
      <span style="color: #64748b; font-size: clamp(0.8rem, 2.5vw, 0.9rem); display: block; margin-bottom: 15px;" id="totalProdutos">Total: 0</span>
      
      <table class="modern-table">
        <thead>
          <tr>
            <th>Referência</th>
            <th>Nome</th>
            <th>Compra</th>
            <th>Venda</th>
            <th>Estoque</th>
            <th>Cadastro</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>

      <!-- Paginação -->
      <div class="pagination" id="paginacao"></div>
    </div>

  </div>

  <!-- MODAL DETALHES -->
  <div id="modal-detalhes" uk-modal>
    <div class="uk-modal-dialog">
      <div class="modal-header">
        <i class="fas fa-info-circle" style="color: var(--primary);"></i>
        <h2>Detalhes do Produto</h2>
      </div>
      
      <div id="detalhes-produto"></div>
      
      <div style="display: flex; justify-content: flex-end; margin-top: 25px;">
        <button class="btn-secondary uk-modal-close">
          <i class="fas fa-arrow-left"></i>
          Voltar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL EDIÇÃO -->
  <div id="modal-editar" uk-modal>
    <div class="uk-modal-dialog">
      <div class="modal-header">
        <i class="fas fa-edit" style="color: var(--warning);"></i>
        <h2>Editar Produto</h2>
      </div>
      
      <input type="hidden" id="edit-id">
      
      <div class="uk-margin">
        <label class="form-label">Referência</label>
        <input id="edit-referencia" class="modern-input" readonly>
      </div>
      
      <div class="uk-margin">
        <label class="form-label">Nome</label>
        <input id="edit-nome" class="modern-input">
      </div>
      
      <div class="uk-margin">
        <label class="form-label">Preço de Compra</label>
        <input id="edit-precoCompra" class="modern-input preco-mask">
      </div>
      
      <div class="uk-margin">
        <label class="form-label">Preço de Venda</label>
        <input id="edit-precoVenda" class="modern-input preco-mask">
      </div>
      
      <div class="uk-margin">
        <label class="form-label">Quantidade em Estoque</label>
        <input id="edit-estoque" type="number" min="0" class="modern-input">
      </div>
      
      <div style="display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap;">
        <button class="btn-secondary uk-modal-close" style="flex: 1;">
          <i class="fas fa-arrow-left"></i>
          Voltar
        </button>
        <button onclick="atualizarProduto()" class="btn-primary" style="flex: 1;">
          <i class="fas fa-save"></i>
          Salvar
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ===================== IMPORTA api.js ===================== -->
<script src="api.js"></script>

<script>
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

let todosProdutos = [];
let produtosFiltrados = [];
let paginaAtual = 1;
let itensPorPagina = 10; // Valor padrão

// Menu hamburguer
function toggleMenu() {
  document.getElementById('dropdownMenu').classList.toggle('show');
}

// Fechar menu ao clicar fora
document.addEventListener('click', function(event) {
  if (!event.target.closest('.menu-container')) {
    document.getElementById('dropdownMenu').classList.remove('show');
  }
});

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

// Função para mudar quantidade de itens por página
function mudarItensPorPagina(valor) {
  if (valor === 'todos') {
    itensPorPagina = produtosFiltrados.length;
  } else {
    itensPorPagina = parseInt(valor);
  }
  paginaAtual = 1;
  renderizarPaginacao();
  renderizarTabela();
}

$(document).ready(function() {
  $('.preco-mask').mask('000.000.000.000.000,00', {reverse: true});
});

function converterPrecoParaFloat(valor) {
  if (!valor) return 0;
  return parseFloat(valor.replace(/\./g, '').replace(',', '.'));
}

function formatarPreco(valor) {
  return valor.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function limparForm() {
  nome.value = "";
  precoCompra.value = "";
  precoVenda.value = "";
  estoque.value = "";
  // Não limpa a referência, ela será gerada novamente ao salvar
}

// Função para gerar próxima referência
function gerarProximaReferencia() {
  if (!todosProdutos || todosProdutos.length === 0) {
    return "M-100";
  }
  
  // Extrair números das referências existentes
  const numeros = todosProdutos.map(p => {
    const match = p.referencia?.match(/M-(\d+)/);
    return match ? parseInt(match[1]) : 0;
  });
  
  const maxNumero = Math.max(...numeros, 99); // Começa de 100 se não houver
  const proximoNumero = maxNumero + 1;
  
  return `M-${proximoNumero}`;
}

// Função para atualizar o campo de referência com o próximo valor
function atualizarCampoReferencia() {
  const referenciaInput = document.getElementById('referencia');
  referenciaInput.value = gerarProximaReferencia();
}

async function salvar() {
  const referenciaProduto = referencia.value.trim(); // Já vem preenchido automaticamente
  const nomeProduto = nome.value.trim();
  const precoCompraValor = converterPrecoParaFloat(precoCompra.value);
  const precoVendaValor = converterPrecoParaFloat(precoVenda.value);
  const estoqueQtd = parseInt(estoque.value) || 0;

  if (!referenciaProduto || !nomeProduto || precoCompraValor <= 0 || precoVendaValor <= 0) {
    UIkit.notification({ 
      message: '<i class="fas fa-exclamation-triangle"></i> Preencha todos os campos corretamente.', 
      status: 'warning' 
    });
    return;
  }

  await apiFetch("/produtos", {
    method: "POST",
    body: JSON.stringify({
      referencia: referenciaProduto,
      nome: nomeProduto,
      precoCompra: precoCompraValor,
      precoVenda: precoVendaValor,
      estoque: estoqueQtd
    })
  });

  UIkit.notification({ 
    message: '<i class="fas fa-check-circle"></i> Produto cadastrado!', 
    status: 'success' 
  });
  
  limparForm();
  await listar(); // Aguarda listar para atualizar a lista e depois gerar nova referência
  atualizarCampoReferencia(); // Gera a próxima referência para o próximo cadastro
}

async function excluir(id) {
  UIkit.modal.confirm('Confirmar exclusão?').then(async function() {
    await apiFetch("/produtos/" + id, { method: "DELETE" });
    UIkit.notification({ message: 'Produto excluído!', status: 'success' });
    await listar();
    atualizarCampoReferencia(); // Atualiza referência após exclusão
  });
}

function verDetalhes(produto) {
  const detalhes = document.getElementById('detalhes-produto');
  
  detalhes.innerHTML = `
    <div class="detail-item">
      <div class="detail-label">📦 Referência</div>
      <div class="detail-value">${produto.referencia || 'N/A'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">🏷️ Produto</div>
      <div class="detail-value">${produto.nome}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">📊 Quantidade em Estoque</div>
      <div class="detail-value">${produto.estoque} unidades</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">💰 Preço de Venda</div>
      <div class="detail-value">R$ ${formatarPreco(produto.precoVenda)}</div>
    </div>
  `;
  
  UIkit.modal('#modal-detalhes').show();
}

function editar(produto) {
  document.getElementById('edit-id').value = produto.id;
  document.getElementById('edit-referencia').value = produto.referencia || '';
  document.getElementById('edit-nome').value = produto.nome;
  document.getElementById('edit-precoCompra').value = formatarPreco(produto.precoCompra);
  document.getElementById('edit-precoVenda').value = formatarPreco(produto.precoVenda);
  document.getElementById('edit-estoque').value = produto.estoque;
  
  $('#edit-precoCompra').mask('000.000.000.000.000,00', {reverse: true});
  $('#edit-precoVenda').mask('000.000.000.000.000,00', {reverse: true});
  
  UIkit.modal('#modal-editar').show();
}

async function atualizarProduto() {
  const id = document.getElementById('edit-id').value;
  const referencia = document.getElementById('edit-referencia').value.trim();
  const nome = document.getElementById('edit-nome').value.trim();
  const precoCompra = converterPrecoParaFloat(document.getElementById('edit-precoCompra').value);
  const precoVenda = converterPrecoParaFloat(document.getElementById('edit-precoVenda').value);
  const estoque = parseInt(document.getElementById('edit-estoque').value) || 0;
  
  if (!referencia || !nome || precoCompra <= 0 || precoVenda <= 0) {
    UIkit.notification({ message: 'Preencha todos os campos!', status: 'warning' });
    return;
  }
  
  await apiFetch("/produtos/" + id, {
    method: "PUT",
    body: JSON.stringify({ referencia, nome, precoCompra, precoVenda, estoque })
  });
  
  UIkit.notification({ message: 'Produto atualizado!', status: 'success' });
  UIkit.modal('#modal-editar').hide();
  await listar();
  atualizarCampoReferencia(); // Atualiza referência após edição (caso necessário)
}

function filtrarProdutos() {
  const termo = pesquisa.value.toLowerCase().trim();
  if (!termo) {
    produtosFiltrados = [...todosProdutos];
  } else {
    produtosFiltrados = todosProdutos.filter(p => 
      p.nome.toLowerCase().includes(termo) || 
      (p.referencia && p.referencia.toLowerCase().includes(termo))
    );
  }
  paginaAtual = 1;
  
  // Atualizar o select de itens por página se estiver em "todos"
  const selectItens = document.getElementById('itensPorPagina');
  if (selectItens.value === 'todos') {
    itensPorPagina = produtosFiltrados.length;
  }
  
  renderizarPaginacao();
  renderizarTabela();
  document.getElementById('totalProdutos').innerText = `Total: ${produtosFiltrados.length}`;
}

function renderizarPaginacao() {
  const totalPaginas = Math.ceil(produtosFiltrados.length / itensPorPagina);
  const paginacao = document.getElementById('paginacao');
  
  if (produtosFiltrados.length <= itensPorPagina || totalPaginas <= 1) {
    paginacao.innerHTML = '';
    return;
  }
  
  let html = '';
  
  // Botão anterior
  html += `<button class="page-btn" onclick="mudarPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>
    <i class="fas fa-chevron-left"></i>
  </button>`;
  
  // Botões de página
  for (let i = 1; i <= totalPaginas; i++) {
    if (i === 1 || i === totalPaginas || (i >= paginaAtual - 1 && i <= paginaAtual + 1)) {
      html += `<button class="page-btn ${i === paginaAtual ? 'active' : ''}" onclick="mudarPagina(${i})">${i}</button>`;
    } else if (i === paginaAtual - 2 || i === paginaAtual + 2) {
      html += `<button class="page-btn" disabled>...</button>`;
    }
  }
  
  // Botão próximo
  html += `<button class="page-btn" onclick="mudarPagina(${paginaAtual + 1})" ${paginaAtual === totalPaginas ? 'disabled' : ''}>
    <i class="fas fa-chevron-right"></i>
  </button>`;
  
  paginacao.innerHTML = html;
}

function mudarPagina(novaPagina) {
  const totalPaginas = Math.ceil(produtosFiltrados.length / itensPorPagina);
  if (novaPagina >= 1 && novaPagina <= totalPaginas) {
    paginaAtual = novaPagina;
    renderizarPaginacao();
    renderizarTabela();
  }
}

function renderizarTabela() {
  const inicio = (paginaAtual - 1) * itensPorPagina;
  const fim = Math.min(inicio + itensPorPagina, produtosFiltrados.length);
  const produtosPagina = produtosFiltrados.slice(inicio, fim);
  
  const lista = document.getElementById('lista');
  lista.innerHTML = "";
  
  produtosPagina.forEach(p => {
    let stockClass = 'normal';
    let stockText = 'Normal';
    
    if (p.estoque === 0) {
      stockClass = 'falta';
      stockText = 'Em falta';
    } else if (p.estoque < 10) {
      stockClass = 'baixo';
      stockText = 'Baixo';
    }
    
    lista.innerHTML += `
      <tr>
        <td><strong>${p.referencia || 'N/A'}</strong></td>
        <td><strong>${p.nome}</strong></td>
        <td>R$ ${formatarPreco(p.precoCompra)}</td>
        <td>R$ ${formatarPreco(p.precoVenda)}</td>
        <td><span class="stock-badge ${stockClass}">${stockText} (${p.estoque})</span></td>
        <td>${new Date(p.createdAt).toLocaleDateString()}</td>
        <td>
          <div class="action-buttons">
            <button onclick='verDetalhes(${JSON.stringify(p).replace(/'/g, "\\'")})' 
                    class="action-btn info" title="Detalhes">
              <i class="fas fa-eye"></i>
            </button>
            <button onclick='editar(${JSON.stringify(p).replace(/'/g, "\\'")})' 
                    class="action-btn edit" title="Editar">
              <i class="fas fa-edit"></i>
            </button>
            <button onclick="excluir('${p.id}')" 
                    class="action-btn delete" title="Excluir">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </td>
      </tr>`;
  });
  
  if (produtosPagina.length === 0) {
    lista.innerHTML = `
      <tr>
        <td colspan="7">
          <div class="empty-state">
            <i class="fas fa-box-open"></i>
            <p>Nenhum produto encontrado</p>
          </div>
        </td>
      </tr>`;
  }
}

async function listar() {
  const data = await apiFetch("/produtos");
  if (!Array.isArray(data)) return;
  
  todosProdutos = data;
  produtosFiltrados = [...todosProdutos];
  paginaAtual = 1;
  
  // Atualizar itens por página baseado no select atual
  const selectItens = document.getElementById('itensPorPagina');
  if (selectItens.value === 'todos') {
    itensPorPagina = produtosFiltrados.length;
  } else {
    itensPorPagina = parseInt(selectItens.value);
  }
  
  document.getElementById('totalProdutos').innerText = `Total: ${todosProdutos.length}`;
  renderizarPaginacao();
  renderizarTabela();
  
  // Atualizar campo de referência para o próximo cadastro
  atualizarCampoReferencia();
}

// Inicializar
listar();
</script>
